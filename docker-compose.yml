services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        else
          redis-server --appendonly yes
        fi
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping; else redis-cli ping; fi
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET:-dev-auth-secret}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-dev-spotify-client-id}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-dev-spotify-client-secret}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-dev-youtube-api-key}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD-}
      PORT: "3000"
      HOSTNAME: 0.0.0.0

  app-dev:
    profiles: ["dev"]
    build:
      context: .
      target: dev
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    command: npm run dev
    environment:
      NODE_ENV: development
      AUTH_SECRET: ${AUTH_SECRET:-dev-auth-secret}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-dev-spotify-client-id}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-dev-spotify-client-secret}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-dev-youtube-api-key}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD-}
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next

volumes:
  redis_data:
  app_node_modules:
  app_next:
